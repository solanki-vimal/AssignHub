{% extends 'layouts/base_auth.html' %}
{% load static %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="text-center">
    <div class="w-16 h-16 bg-teal-50 rounded-full flex items-center justify-center mx-auto mb-6">
        <i data-lucide="check-circle" class="w-8 h-8 text-teal-500"></i>
    </div>
    
    <h2 class="text-3xl font-bold text-slate-900 mb-3">Password Updated</h2>
    <p class="text-slate-600 mb-8 max-w-sm mx-auto">Your password has been reset successfully. You can now use your new password to sign in to your account.</p>
    
    <a href="{% url 'accounts:login' %}" class="w-full py-5 block bg-gradient-to-r from-teal-500 to-blue-600 hover:from-teal-600 hover:to-blue-700 text-white text-base rounded-xl shadow-lg shadow-teal-500/25 transition-all font-semibold">
        Sign In
    </a>
</div>
{% endblock %}
