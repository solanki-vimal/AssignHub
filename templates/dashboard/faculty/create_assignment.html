{% extends 'faculty/base_faculty.html' %}
{% load static %}

{% block title %}Create Assignment - Faculty{% endblock %}
{% block header_title %}New Assignment{% endblock %}

{% block content %}
<div class="max-w-4xl">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <form method="POST" enctype="multipart/form-data" class="p-8">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <!-- Course & Batch Selection -->
                <div class="space-y-6">
                    <div>
                        <label for="course" class="block text-sm font-bold text-slate-700 mb-2">Select Course</label>
                        <select name="course_id" id="course" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all">
                            <option value="">Choose a course...</option>
                            {% for course in faculty_courses %}
                            <option value="{{ course.id }}">{{ course.code }} - {{ course.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label for="batch" class="block text-sm font-bold text-slate-700 mb-2">Select Batch</label>
                        <select name="batch_id" id="batch" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all">
                            <option value="">Choose a batch...</option>
                            {% for course in faculty_courses %}
                            {% for batch in course.batches.all %}
                            <option value="{{ batch.id }}" data-course="{{ course.id }}">{{ batch.name }} ({{
                                batch.academic_year }})</option>
                            {% endfor %}
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label for="due_date" class="block text-sm font-bold text-slate-700 mb-2">Due Date &
                            Time</label>
                        <input type="datetime-local" name="due_date" id="due_date" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all text-slate-600">
                    </div>
                </div>

                <!-- Basic Info -->
                <div class="space-y-6">
                    <div>
                        <label for="title" class="block text-sm font-bold text-slate-700 mb-2">Assignment Title</label>
                        <input type="text" name="title" id="title" placeholder="e.g. Lab 1: Getting Started" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all">
                    </div>

                    <div>
                        <label for="description" class="block text-sm font-bold text-slate-700 mb-2">Description /
                            Instructions</label>
                        <textarea name="description" id="description" rows="5"
                            placeholder="Enter assignment instructions..." required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all resize-none"></textarea>
                    </div>
                </div>
            </div>

            <!-- Attachments -->
            <div class="mb-8 p-6 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-2 bg-indigo-100 text-indigo-600 rounded-lg">
                        <i data-lucide="paperclip" class="w-5 h-5"></i>
                    </div>
                    <label class="text-sm font-bold text-slate-700">Attachments (Optional)</label>
                </div>
                <input type="file" name="attachments" multiple
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                <p class="text-xs text-slate-400 mt-2">You can upload multiple files (PDF, DOCX, ZIP, etc.)</p>
            </div>

            <!-- Published Toggle -->
            <div class="flex items-center gap-3 mb-8">
                <div class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-200 cursor-pointer transition-colors"
                    onclick="this.classList.toggle('bg-indigo-600'); document.getElementById('published').click();">
                    <div class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"
                        id="toggle-circle"></div>
                </div>
                <input type="checkbox" name="published" id="published" class="hidden"
                    onchange="document.getElementById('toggle-circle').classList.toggle('translate-x-6'); document.getElementById('toggle-circle').classList.toggle('translate-x-1');">
                <label for="published" class="text-sm font-medium text-slate-700 cursor-pointer">Publish immediately
                    (visible to students)</label>
            </div>

            <div class="flex items-center gap-4 border-t border-slate-100 pt-8">
                <button type="submit"
                    class="inline-flex items-center gap-2 px-8 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-500/30 transform hover:-translate-y-0.5 font-bold uppercase tracking-wider text-sm">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    Save Assignment
                </button>
                <a href="{% url 'dashboard:faculty_assignments' %}"
                    class="px-8 py-3 text-slate-500 hover:text-slate-800 font-bold uppercase tracking-wider text-sm">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Basic filter for batches based on selected course
    document.getElementById('course').addEventListener('change', function () {
        const courseId = this.value;
        const batchSelect = document.getElementById('batch');
        const batches = batchSelect.options;

        for (let i = 0; i < batches.length; i++) {
            if (batches[i].value === "") continue;
            if (batches[i].getAttribute('data-course') === courseId) {
                batches[i].style.display = "";
            } else {
                batches[i].style.display = "none";
            }
        }
        batchSelect.value = "";
    });
</script>
{% endblock %}
