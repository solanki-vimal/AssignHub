<a href="{% url 'dashboard:profile' %}" class="block">
    <div class="p-4 mx-4 mt-4 bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-semibold uppercase">
                {{ request.user.first_name|default:request.user.email|make_list|first }}
            </div>
            <div class="overflow-hidden">
                <p class="font-semibold text-slate-800 truncate"
                    title="{{ request.user.get_full_name|default:request.user.email }}">
                    {{ request.user.get_full_name|default:request.user.email }}
                </p>
                <p class="text-xs text-slate-500 capitalize">{{ request.user.get_role_display }}</p>
            </div>
        </div>
    </div>
</a>
