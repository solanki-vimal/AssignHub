{% if messages %}
<div class="mb-6 space-y-3" id="toast-container">
    {% for message in messages %}
    <div class="p-4 rounded-lg flex items-start justify-between gap-3 transition-opacity duration-300 {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %}"
        id="toast-{{ forloop.counter }}">
        <div class="flex items-start gap-3">
            {% if message.tags == 'error' %}
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
            {% else %}
            <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
            {% endif %}
            <div>{{ message }}</div>
        </div>
        <button type="button" onclick="dismissToast('toast-{{ forloop.counter }}')"
            class="flex-shrink-0 p-1 rounded-md inline-flex items-center justify-center text-slate-400 hover:text-slate-500 hover:bg-black/5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
            <span class="sr-only">Close</span>
            <i data-lucide="x" class="w-4 h-4"></i>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
